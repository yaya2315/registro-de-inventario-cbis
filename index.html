<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acceso al sistema de Inventario y Registro de Equipo de cbis. Control de activos seguro para administradores." />
  <meta name="theme-color" content="#3d2570" />
  <title>Iniciar Sesión · Inventario y Registro de Equipo</title>

  <link rel="icon" href="Imagenes/Cbis_transparente.png" />
  <link rel="stylesheet" href="estilos-base.css" />
  <link rel="stylesheet" href="estilos-login.css" />
</head>
<body>

  <!-- Atmósfera de marca -->
  <span class="glow g1" aria-hidden="true"></span>
  <span class="glow g2" aria-hidden="true"></span>
  <span class="glow g3" aria-hidden="true"></span>
  <span class="glow g4" aria-hidden="true"></span>

  <main>
    <!-- Marca -->
    <header class="brand">
      <img class="logo" src="Imagenes/Cbis_transparente.png" alt="Logo cbis" />
      <h1>Inventario y Registro de Equipo</h1>
      <p class="subtitle">Sistema de Control</p>
    </header>

    <!-- Formulario -->
    <section class="card">
      <h2>Iniciar Sesión</h2>

      <form id="form-login" novalidate>
        <div class="field">
          <label for="email">Correo Electrónico</label>
          <div class="control">
            <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/>
            </svg>
            <input type="email" id="email" name="email" autocomplete="email" inputmode="email" placeholder="correo@ejemplo.com" required />
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="control">
            <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required minlength="6" />
            <button type="button" class="toggle" id="toggle-pass" aria-label="Mostrar contraseña" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="message" id="message" role="status" aria-live="polite"></p>

        <button type="submit" class="btn" id="btn-submit">
          <span class="spinner" aria-hidden="true"></span>
          <span class="label">Ingresar al Sistema</span>
        </button>

        <p class="footnote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Acceso seguro para administradores
        </p>
      </form>
    </section>

    <p class="demo-tag" id="demo-tag">Modo demo · agrega tu configuración de <b>Firebase</b> para activar el acceso real</p>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
